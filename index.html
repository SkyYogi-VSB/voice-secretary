<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e94560">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com; connect-src https://www.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com; style-src 'self' 'unsafe-inline';">
  <link rel="manifest" href="manifest.json">
  <title>Voice Secretary</title>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .status-bar {
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-bar .week {
      background: #16213e;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .status-bar .drive-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .status-bar .drive-status.connected { background: #4ecca3; }

    .transcript-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .transcript-area .placeholder {
      color: #444;
      text-align: center;
      margin-top: 30vh;
      font-size: 15px;
      line-height: 1.6;
    }

    #transcript {
      font-size: 17px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #interim {
      color: #666;
      font-style: italic;
    }

    .controls {
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .record-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .rec-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid #e94560;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .rec-btn .inner {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #e94560;
      transition: all 0.2s;
    }

    .rec-btn.recording .inner {
      border-radius: 6px;
      width: 24px; height: 24px;
      background: #ff6b6b;
    }

    .rec-btn.recording {
      border-color: #ff6b6b;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }

    .tag-row {
      display: flex;
      gap: 10px;
    }

    .tag-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .tag-btn:active { transform: scale(0.97); }

    .tag-btn.work {
      background: #0f3460;
      color: #4cc9f0;
    }

    .tag-btn.personal {
      background: #1a0a2e;
      color: #b388ff;
    }

    .tag-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .discard-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid #444;
      background: transparent;
      color: #888;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .discard-btn:active { border-color: #ff6b6b; color: #ff6b6b; }
    .discard-btn:disabled { opacity: 0; pointer-events: none; }

    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #16213e;
      color: #4ecca3;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error { color: #ff6b6b; }
  </style>
</head>
<body>

<div class="status-bar">
  <span id="weekLabel" class="week"></span>
  <span id="versionLabel" style="font-size:11px;color:#555;"></span>
  <div id="driveStatus" class="drive-status" title="Drive connection"></div>
</div>

<div class="transcript-area">
  <div id="placeholderText" class="placeholder">
    Hold the button and speak.<br>Release when done.
  </div>
  <div id="transcript"></div>
  <span id="interim"></span>
</div>

<div class="controls">
  <div class="record-row">
    <button class="discard-btn" id="discardBtnL" disabled aria-label="Discard">&#x2715;</button>
    <button class="rec-btn" id="recBtn" aria-label="Record">
      <div class="inner"></div>
    </button>
    <button class="discard-btn" id="discardBtnR" disabled aria-label="Discard">&#x2715;</button>
  </div>
  <div class="tag-row">
    <button class="tag-btn work" id="workBtn" disabled>Save to Work</button>
    <button class="tag-btn personal" id="personalBtn" disabled>Save to Personal</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>

</body>
</html>
